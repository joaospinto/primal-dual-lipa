name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

env:
  LIPA_SKIP_VISUALIZATIONS: "1"
  PYTHONUTF8: "1"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install --upgrade --editable ".[test]"

      - name: Test
        run: python -m unittest discover -v
